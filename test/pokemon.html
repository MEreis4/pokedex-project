<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>

    <!-- Normalize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
      integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"/>
    
    <!-- Roboto Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"/>

    <!-- CSS Externo/Global -->
    <link rel="stylesheet" href="/assets/css/global.css" />
    <link rel="stylesheet" href="/assets/css/pokedex.css" />
    <link rel="stylesheet" href="/assets/css/pokemon.css" />
  </head>
  <body>
    <section class="pokeInfo content grass">
        <div class="close&Fav">
            <button type="button">C</button>
            <button type="button">F</button>
        </div>
        <div class="mainInfo">    
        <span class="name">Bulbasaur</span>
        <span class="id">#001</span>
            <ol class="types">
                <li class="grass">Grass</li>
                <li class="poison">Poison</li>
            </ol>
        </div>
        <div class="miscellaneous">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" alt="bulba">
            <nav class="topics">
              <button class="tab-btn active">About</button>
              <button class="tab-btn">Base Stats</button>
              <button class="tab-btn">Evolution</button>
              <button class="tab-btn">Moves</button>
            </nav>
        </div>
    </section>

    <!-- JS Externo -->
    <script src="/assets/js/pokemon-model.js"></script>
    <script src="/assets/js/poke-api.js"></script>
  </body>
</html>
